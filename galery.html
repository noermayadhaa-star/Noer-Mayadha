<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Foto - Noer Mayadha</title>
    <style>
        /* CSS sama seperti sebelumnya */
        body, header, nav, footer { /* copy dari atas */ }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; padding: 20px; }
        .gallery img { width: 100%; height: 250px; object-fit: cover; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); transition: 0.3s; }
        .gallery img:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <header><h1>Galeri Foto</h1></header>
    <nav>
        <a href="index.html">Home</a>
        <a href="biodata.html">Biodata</a>
        <a href="galeri-foto.html">Galeri Foto</a>
        <a href="galeri-video.html">Galeri Video</a>
    </nav>

    <div class="gallery">
        <img src="https://via.placeholder.com/600x400?text=Foto+1" alt="Foto 1">
        <img src="https://via.placeholder.com/600x400?text=Foto+2" alt="Foto 2">
        <img src="https://via.placeholder.com/600x400?text=Foto+3" alt="Foto 3">
        <!-- Ganti link di atas dengan link gambar kamu (upload ke assets/images/) -->
    </div>

    <footer><p>&copy; 2026 Noer Mayadha</p></footer>
</body>
</html>
