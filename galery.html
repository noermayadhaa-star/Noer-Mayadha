<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Foto - Pink Web</title>
    <style>
        /* CSS UTAMA */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fff0f5; /* Background Pink Muda */
            color: #333;
        }

        /* HEADER & NAVIGASI */
        header {
            background-color: #ff69b4; /* Hot Pink */
            color: white;
            padding: 25px;
            text-align: center;
        }

        nav {
            display: flex;
            justify-content: center;
            background-color: #ffb6c1;
            padding: 12px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            text-decoration: none;
            color: #d81b60;
            font-weight: bold;
            margin: 0 15px;
            padding: 8px 15px;
            border-radius: 20px;
            transition: 0.3s;
        }

        nav a:hover {
            background-color: #ff69b4;
            color: white;
        }

        /* KONTEN GALERI */
        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
            text-align: center;
        }

        h2 {
            color: #ff1493;
            margin-bottom: 30px;
            font-size: 2em;
        }

        /* GRID SYSTEM */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 100px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            background-color: white;
            border: 5px solid white;
            transition: transform 0.3s ease;
        }

        .gallery-item:hover {
            transform: scale(1.03); /* Efek zoom sedikit saat kursor lewat */
            border-color: #ffb6c1;
        }

        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover; /* Menjaga foto tetap proporsional */
            display: block;
        }

        .caption {
            padding: 15px;
            background: white;
            color: #d81b60;
            font-weight: bold;
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 15px;
            background-color: #ff69b4;
            color: white;
            position: fixed;
            bottom: 0;
            width: 100%;
        }

        /* Animasi masuk */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .gallery-item {
            animation: fadeIn 0.8s ease forwards;
        }
    </style>
</head>
<body>

<header>
    <h1>Koleksi Foto</h1>
</header>

<nav>
    <a href="index.html">Beranda</a>
    <a href="biodata.html">Biodata</a>
    <a href="foto.html" style="background: #ff69b4; color: white;">Foto</a>
    <a href="video.html">Video</a>
</nav>

<div class="container">
    <h2>Momen Favorit</h2>
    
    <div class="gallery-grid">
        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1494177310973-4841f7d5a882?auto=format&fit=crop&q=80&w=500" alt="Foto 1">
            <div class="caption">Traveling Ke Pantai</div>
        </div>

        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1527443154391-507e9dc6c5cc?auto=format&fit=crop&q=80&w=500" alt="Foto 2">
            <div class="caption">Hobi Fotografi</div>
        </div>

        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1516280440614-37939bbacd81?auto=format&fit=crop&q=80&w=500" alt="Foto 3">
            <div class="caption">Waktu Bersantai</div>
        </div>

        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1496293455970-f8581aae0e3c?auto=format&fit=crop&q=80&w=500" alt="Foto 4">
            <div class="caption">Kuliner Seru</div>
        </div>

        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1513151233558-d860c5398176?auto=format&fit=crop&q=80&w=500" alt="Foto 5">
            <div class="caption">Pesta Ulang Tahun</div>
        </div>

        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1522673607200-164883eecd0c?auto=format&fit=crop&q=80&w=500" alt="Foto 6">
            <div class="caption">Pemandangan Kota</div>
        </div>
    </div>
</div>

<footer>
    &copy; 2024 Pink Web Design - Galeri Foto Cantik
</footer>

</body>
</html>
